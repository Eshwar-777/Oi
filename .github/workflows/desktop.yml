name: Desktop CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/desktop/**"
      - "apps/frontend/design-system/**"
      - "packages/**"
  pull_request:
    paths:
      - "apps/frontend/desktop/**"
      - "apps/frontend/design-system/**"
      - "packages/**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @oi/desktop typecheck

  build:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-typecheck
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Electron
        run: pnpm --filter @oi/desktop build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/frontend/desktop/release/*
