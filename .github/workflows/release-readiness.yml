name: Release Readiness

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap backend
        run: make -C apps/backend bootstrap

      - name: Run repo CI
        run: pnpm run ci

      - name: Build release artifacts
        run: pnpm build:all
