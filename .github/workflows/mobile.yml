name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/mobile/**"
      - "apps/frontend/design-system/**"
      - "packages/**"
  pull_request:
    paths:
      - "apps/frontend/mobile/**"
      - "apps/frontend/design-system/**"
      - "packages/**"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @oi/mobile typecheck

      - name: Lint
        run: pnpm --filter @oi/mobile lint

  build-eas:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (staging)
        run: |
          cd apps/frontend/mobile
          eas build --platform all --profile staging --non-interactive
