name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @oi/web typecheck

      - name: Lint
        run: pnpm --filter @oi/web lint

      - name: Build
        run: pnpm --filter @oi/web build
