name: Extension CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/extension/**"
  pull_request:
    paths:
      - "apps/extension/**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @oi/extension typecheck

      - name: Build
        run: pnpm --filter @oi/extension build

      - uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: apps/extension/dist/
