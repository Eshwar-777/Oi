<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: #FFFFFF;
      color: #1A0A10;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .brand { font-size: 20px; font-weight: 700; color: #751636; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #9A8288;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #24C07F;
    }
    .dot.offline { background: #9A8288; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #9A8288;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .task-card {
      background: #F9F5F6;
      border: 1px solid #E0D0D4;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 6px;
    }
    .task-name { font-size: 13px; font-weight: 500; }
    .task-status { font-size: 11px; color: #9A8288; margin-top: 2px; }
    .empty {
      text-align: center;
      padding: 20px;
      color: #9A8288;
      font-size: 13px;
    }
    .open-btn {
      display: block;
      width: 100%;
      background: #751636;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .open-btn:hover { background: #63122E; }
  </style>
</head>
<body>
  <div class="header">
    <span class="brand">OI</span>
    <span class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connected</span>
    </span>
  </div>

  <div class="section-title">Active Tasks</div>
  <div id="tasksList">
    <div class="empty">No active tasks</div>
  </div>

  <button class="open-btn" id="openApp">Open OI Dashboard</button>

  <script src="popup.ts"></script>
</body>
</html>
